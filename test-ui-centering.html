<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Centering Test - School Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }

        #root {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            position: relative;
        }

        .app-container {
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container main {
            position: relative;
            display: flex !important;
            align-items: center;
            justify-content: center;
            width: 100vw !important;
            margin: 0 !important;
            padding: 20px !important;
            box-sizing: border-box;
        }

        .login-container {
            width: 100vw;
            minHeight: 100vh;
            display: flex;
            alignItems: center;
            justifyContent: center;
            background: url("https://images.unsplash.com/photo-1523050853063-8802a83557e9?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80") center/cover no-repeat;
            backgroundAttachment: fixed;
            padding: 20px;
            margin: 0;
            boxSizing: border-box;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .test-info {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin: 20px;
            text-align: center;
        }

        .measurement-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .center-line {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255, 0, 0, 0.5);
            transform: translateX(-50%);
        }

        .left-margin, .right-margin {
            position: absolute;
            top: 50%;
            width: 2px;
            height: 100px;
            background: rgba(0, 255, 0, 0.7);
            transform: translateY(-50%);
        }

        .left-margin {
            left: 20px;
        }

        .right-margin {
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="measurement-lines">
        <div class="center-line"></div>
        <div class="left-margin"></div>
        <div class="right-margin"></div>
    </div>

    <div class="test-info">
        <h2 style="color: #22c55e; margin-bottom: 10px;">UI Centering Test</h2>
        <p>Red line = Screen center | Green lines = Left/Right margins (should be equal)</p>
        <p>The login form below should be perfectly centered between the green lines</p>
    </div>

    <div class="app-container">
        <main>
            <div class="login-container">
                <div class="glass">
                    <h2 style="margin-bottom: 10px;">Welcome Back</h2>
                    <p style="color: #94a3b8; margin-bottom: 30px;">School Management System</p>
                    
                    <div style="margin-bottom: 20px; text-align: left;">
                        <label style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Username</label>
                        <input type="text" placeholder="Enter your username" style="
                            background: rgba(255, 255, 255, 0.03);
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            color: white;
                            padding: 12px;
                            border-radius: 8px;
                            width: 100%;
                            outline: none;
                        ">
                    </div>

                    <div style="margin-bottom: 30px; text-align: left;">
                        <label style="display: block; margin-bottom: 8px; font-size: 0.9rem;">Password</label>
                        <input type="password" placeholder="••••••••" style="
                            background: rgba(255, 255, 255, 0.03);
                            border: 1px solid rgba(255, 255, 255, 0.1);
                            color: white;
                            padding: 12px;
                            border-radius: 8px;
                            width: 100%;
                            outline: none;
                        ">
                    </div>

                    <button style="
                        background: linear-gradient(135deg, #6366f1, #0ea5e9);
                        color: white;
                        border: none;
                        padding: 14px;
                        border-radius: 8px;
                        cursor: pointer;
                        font-weight: 500;
                        width: 100%;
                    ">Sign In</button>

                    <p style="margin-top: 20px; font-size: 0.9rem; color: #94a3b8;">
                        Don't have an account? <a href="#" style="color: #6366f1; text-decoration: none;">Register here</a>
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Add visual feedback for centering
        window.addEventListener('load', function() {
            const container = document.querySelector('.glass');
            const containerRect = container.getBoundingClientRect();
            const screenWidth = window.innerWidth;
            const leftDistance = containerRect.left;
            const rightDistance = screenWidth - containerRect.right;
            
            console.log('Container left distance:', leftDistance);
            console.log('Container right distance:', rightDistance);
            console.log('Difference:', Math.abs(leftDistance - rightDistance));
            
            // Show results
            const testInfo = document.querySelector('.test-info');
            testInfo.innerHTML += `
                <div style="margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 5px;">
                    <strong>Centering Results:</strong><br>
                    Left margin: ${leftDistance.toFixed(1)}px<br>
                    Right margin: ${rightDistance.toFixed(1)}px<br>
                    Difference: ${Math.abs(leftDistance - rightDistance).toFixed(1)}px<br>
                    <span style="color: ${Math.abs(leftDistance - rightDistance) < 5 ? '#22c55e' : '#f43f5e'}">
                        ${Math.abs(leftDistance - rightDistance) < 5 ? '✅ PERFECTLY CENTERED' : '❌ NOT CENTERED'}
                    </span>
                </div>
            `;
        });
    </script>
</body>
</html>
